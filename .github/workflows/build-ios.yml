name: Build Unsigned iOS IPA - CookieTyper

on:
  workflow_dispatch:

jobs:
  build:
    if: github.ref == 'refs/heads/zeus'   # تشغيل السير فقط على فرع zeus
    runs-on: macos-latest
    env:
      APP_NAME: CookieTyper
      PROJECT_DIR: cookiestyper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd $PROJECT_DIR
          npm install

      - name: Expo prebuild iOS
        run: |
          cd $PROJECT_DIR
          npx expo prebuild -p ios --non-interactive

      - name: Build iOS app without signing
        run: |
          cd $PROJECT_DIR/ios

          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' CookieTyper.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' CookieTyper.xcodeproj/project.pbxproj

          python3 -c "
          path = 'Podfile'
          with open(path, 'r') as f:
              content = f.read()

          fix_code = '''
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |config|
                    config.build_settings['GCC_OPTIMIZATION_LEVEL'] = '0'
                    config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                    config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                    config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                    config.build_settings['ENABLE_BITCODE'] = 'NO'
                  end
                end
          '''

          if 'post_install do |installer|' in content and 'CODE_SIGNING_ALLOWED' not in content:
              content = content.replace('post_install do |installer|', 'post_install do |installer|' + fix_code)

          with open(path, 'w') as f:
              f.write(content)
          "

          pod install

          xcodebuild build \
            -workspace CookieTyper.xcworkspace \
            -scheme CookieTyper \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create unsigned IPA
        run: |
          cd $PROJECT_DIR/ios

          APP_PATH=$(find build_output -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "App not found anywhere in build_output. Checking full tree:"
            find build_output
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r CookieTyper-unsigned.ipa Payload

          echo "IPA created successfully: $(pwd)/CookieTyper-unsigned.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: cookietyper-ios-unsigned-ipa
          path: cookiestyper/ios/*.ipa
